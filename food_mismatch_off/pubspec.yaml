name: food_mismatch_off
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Kamera ve galeri
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # Dosya / path işlemleri
  path_provider: ^2.1.2
  path: ^1.8.3

  # Local kayıt / tema tercihi
  shared_preferences: ^2.3.2

  # State management
  provider: ^6.1.5+1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # API
  http: ^1.2.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/gidai_app_icon.png"
  adaptive_icon_background: "#FFF9FB"
  adaptive_icon_foreground: "assets/icons/gidai_app_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFF9FB"
  color_dark: "#181226"
  image: assets/icons/gidai_app_icon.png
  image_dark: assets/icons/gidai_app_icon.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#FFF9FB"
    color_dark: "#181226"
    image: assets/icons/gidai_app_icon.png
    image_dark: assets/icons/gidai_app_icon.png